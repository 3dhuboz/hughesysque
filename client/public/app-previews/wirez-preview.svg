  <text x="220" y="220" font-family="Arial,sans-serif" font-size="9" fill="#5a6478">JOB #</text>
  <text x="320" y="220" font-family="Arial,sans-serif" font-size="9" fill="#5a6478">PROPERTY</text>
  <text x="500" y="220" font-family="Arial,sans-serif" font-size="9" fill="#5a6478">TYPE</text>
  <text x="590" y="220" font-family="Arial,sans-serif" font-size="9" fill="#5a6478">STATUS</text>
  <rect x="220" y="225" width="545" height="1" fill="#2a3047"/>
  <!-- Row 1 -->
  <text x="220" y="248" font-family="monospace" font-size="11" fill="#f5a623">WRU-20250303-142</text>
  <text x="320" y="248" font-family="Arial,sans-serif" font-size="11" fill="#e8ecf0">14 George St, Brisbane</text>
  <rect x="500" y="236" width="55" height="18" rx="9" fill="rgba(96,165,250,0.15)"/>
  <text x="510" y="249" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Repair</text>
  <rect x="590" y="236" width="70" height="18" rx="9" fill="rgba(251,146,60,0.15)"/>
  <text x="598" y="249" font-family="Arial,sans-serif" font-size="9" fill="#fb923c">Dispatched</text>
  <!-- Row 2 -->
  <text x="220" y="275" font-family="monospace" font-size="11" fill="#f5a623">WRU-20250302-087</text>
  <text x="320" y="275" font-family="Arial,sans-serif" font-size="11" fill="#e8ecf0">22 Queen St, Southbank</text>
  <rect x="500" y="263" width="80" height="18" rx="9" fill="rgba(248,113,113,0.12)"/>
  <text x="507" y="276" font-family="Arial,sans-serif" font-size="9" fill="#f87171">Smoke Alarm</text>
  <rect x="590" y="263" width="62" height="18" rx="9" fill="rgba(52,211,153,0.15)"/>
  <text x="598" y="276" font-family="Arial,sans-serif" font-size="9" fill="#34d399">Complete</text>
  <!-- Row 3 -->
  <text x="220" y="302" font-family="monospace" font-size="11" fill="#f5a623">WRU-20250301-219</text>
  <text x="320" y="302" font-family="Arial,sans-serif" font-size="11" fill="#e8ecf0">7 Albert St, Fortitude Valley</text>
  <rect x="500" y="290" width="55" height="18" rx="9" fill="rgba(96,165,250,0.15)"/>
  <text x="510" y="303" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Repair</text>
  <rect x="590" y="290" width="60" height="18" rx="9" fill="rgba(245,166,35,0.15)"/>
  <text x="598" y="303" font-family="Arial,sans-serif" font-size="9" fill="#f5a623">Invoiced</text>
  <!-- Row 4 -->
  <text x="220" y="329" font-family="monospace" font-size="11" fill="#f5a623">WRU-20250228-055</text>
  <text x="320" y="329" font-family="Arial,sans-serif" font-size="11" fill="#e8ecf0">31 Edward St, CBD</text>
  <rect x="500" y="317" width="55" height="18" rx="9" fill="rgba(96,165,250,0.15)"/>
  <text x="510" y="330" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">Repair</text>
  <rect x="590" y="317" width="72" height="18" rx="9" fill="rgba(251,191,36,0.15)"/>
  <text x="598" y="330" font-family="Arial,sans-serif" font-size="9" fill="#fbbf24">In Progress</text>
</svg>
