<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="wz-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#181c27"/>
    </linearGradient>
    <linearGradient id="wz-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#e8930d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#wz-bg)" rx="12"/>
  <!-- Sidebar -->
  <rect x="0" y="0" width="180" height="450" fill="#181c27" rx="12"/>
  <rect x="180" y="0" width="1" height="450" fill="#2a3047"/>
  <!-- Logo -->
  <text x="30" y="40" font-family="Arial,sans-serif" font-size="20" fill="#f5a623">⚡</text>
  <text x="55" y="40" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#e8ecf0">Wirez R Us</text>
  <text x="55" y="55" font-family="Arial,sans-serif" font-size="9" fill="#5a6478" text-transform="uppercase">Operations</text>
  <!-- Nav items -->
  <rect x="12" y="80" width="156" height="32" rx="6" fill="rgba(245,166,35,0.12)"/>
  <text x="28" y="100" font-family="Arial,sans-serif" font-size="11" fill="#f5a623">📊 Dashboard</text>
  <text x="28" y="130" font-family="Arial,sans-serif" font-size="11" fill="#8a94a6">➕ New Job</text>
  <text x="28" y="155" font-family="Arial,sans-serif" font-size="11" fill="#8a94a6">📋 Jobs Board</text>
  <text x="28" y="190" font-family="Arial,sans-serif" font-size="11" fill="#8a94a6">💰 Xero</text>
  <text x="28" y="220" font-family="Arial,sans-serif" font-size="11" fill="#8a94a6">⚙️ Settings</text>
  <!-- Header -->
  <text x="205" y="40" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#e8ecf0">Dashboard</text>
  <text x="205" y="58" font-family="Arial,sans-serif" font-size="11" fill="#8a94a6">Monday, 3 March 2025</text>
  <!-- New Job button -->
  <rect x="700" y="24" width="80" height="30" rx="6" fill="url(#wz-accent)"/>
  <text x="717" y="44" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#000">+ New Job</text>
  <!-- Stat cards -->
  <rect x="205" y="75" width="140" height="80" rx="8" fill="#181c27" stroke="#2a3047" stroke-width="1"/>
  <text x="220" y="95" font-family="Arial,sans-serif" font-size="9" fill="#5a6478">ACTIVE JOBS</text>
  <text x="220" y="130" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#60a5fa">12</text>
  <text x="220" y="145" font-family="Arial,sans-serif" font-size="9" fill="#8a94a6">In pipeline</text>
  <rect x="355" y="75" width="140" height="80" rx="8" fill="#181c27" stroke="#2a3047" stroke-width="1"/>
  <text x="370" y="95" font-family="Arial,sans-serif" font-size="9" fill="#5a6478">SCHEDULED TODAY</text>
  <text x="370" y="130" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#f5a623">4</text>
  <text x="370" y="145" font-family="Arial,sans-serif" font-size="9" fill="#8a94a6">Jobs on the books</text>
  <rect x="505" y="75" width="140" height="80" rx="8" fill="#181c27" stroke="#2a3047" stroke-width="1"/>
  <text x="520" y="95" font-family="Arial,sans-serif" font-size="9" fill="#5a6478">AWAITING INVOICE</text>
  <text x="520" y="130" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#fbbf24">3</text>
  <text x="520" y="145" font-family="Arial,sans-serif" font-size="9" fill="#8a94a6">Complete, not invoiced</text>
  <rect x="655" y="75" width="125" height="80" rx="8" fill="#181c27" stroke="#2a3047" stroke-width="1"/>
  <text x="670" y="95" font-family="Arial,sans-serif" font-size="9" fill="#5a6478">INVOICED</text>
  <text x="670" y="130" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#34d399">28</text>
  <text x="670" y="145" font-family="Arial,sans-serif" font-size="9" fill="#8a94a6">All time</text>
  <!-- Recent Jobs table -->
  <rect x="205" y="170" width="575" height="265" rx="8" fill="#181c27" stroke="#2a3047" stroke-width="1"/>
  <text x="220" y="195" font-family="Arial,sans-serif" font-size="11" fill="#8a94a6" font-weight="bold">RECENT JOBS</text>
