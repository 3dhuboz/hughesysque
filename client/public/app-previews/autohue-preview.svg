<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a1a1a"/><stop offset="100%" stop-color="#0d0d1a"/></linearGradient>
    <linearGradient id="acc2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg2)"/>
  <!-- Decorative -->
  <circle cx="350" cy="50" r="50" fill="#00d4ff" opacity="0.06"/>
  <circle cx="50" cy="150" r="35" fill="#06b6d4" opacity="0.05"/>
  <!-- Color swatches mockup -->
  <g transform="translate(30, 35)">
    <rect width="150" height="130" rx="12" fill="#1e1e2e" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
    <!-- Car silhouette placeholder -->
    <rect x="15" y="15" width="120" height="55" rx="6" fill="#ffffff" opacity="0.05"/>
    <rect x="35" y="25" width="80" height="35" rx="4" fill="#00d4ff" opacity="0.1"/>
    <!-- Color dots -->
    <circle cx="30" cy="90" r="8" fill="#ff006e"/>
    <circle cx="52" cy="90" r="8" fill="#00d4ff"/>
    <circle cx="74" cy="90" r="8" fill="#fbbf24"/>
    <circle cx="96" cy="90" r="8" fill="#00ff88"/>
    <circle cx="118" cy="90" r="8" fill="#8b5cf6"/>
    <!-- Sorted label -->
    <rect x="15" y="108" width="120" height="6" rx="3" fill="#00ff88" opacity="0.2"/>
    <text x="75" y="115" font-size="7" fill="#00ff88" text-anchor="middle" font-family="sans-serif">SORTED BY COLOUR</text>
  </g>
  <!-- Right side text -->
  <text x="210" y="70" font-size="24" font-weight="bold" fill="#f3f4f6" font-family="sans-serif">AutoHue</text>
  <text x="210" y="95" font-size="10" fill="#9ca3af" font-family="sans-serif">AI-powered vehicle photo</text>
  <text x="210" y="109" font-size="10" fill="#9ca3af" font-family="sans-serif">colour sorting</text>
  <!-- Feature tags -->
  <rect x="210" y="120" width="65" height="18" rx="9" fill="#ff006e" opacity="0.15"/><text x="242" y="133" font-size="7" fill="#ff006e" text-anchor="middle" font-weight="600" font-family="sans-serif">Car Detection</text>
  <rect x="280" y="120" width="75" height="18" rx="9" fill="#00d4ff" opacity="0.15"/><text x="318" y="133" font-size="7" fill="#00d4ff" text-anchor="middle" font-weight="600" font-family="sans-serif">Colour Sorting</text>
  <rect x="210" y="142" width="60" height="18" rx="9" fill="#00ff88" opacity="0.15"/><text x="240" y="155" font-size="7" fill="#00ff88" text-anchor="middle" font-weight="600" font-family="sans-serif">ZIP Export</text>
  <!-- Bottom tag -->
  <rect x="210" y="168" width="120" height="24" rx="12" fill="#00d4ff" opacity="0.15" stroke="#00d4ff" stroke-width="0.5"/>
  <text x="270" y="184" font-size="9" fill="#00d4ff" text-anchor="middle" font-weight="bold" font-family="sans-serif">FREE to use</text>
</svg>
