<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a0d1a"/><stop offset="100%" stop-color="#0d0d1a"/></linearGradient>
    <linearGradient id="acc3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg3)"/>
  <!-- Decorative -->
  <circle cx="340" cy="45" r="55" fill="#8b5cf6" opacity="0.07"/>
  <circle cx="60" cy="155" r="30" fill="#6366f1" opacity="0.05"/>
  <!-- Phone mockup -->
  <g transform="translate(40, 20)">
    <rect width="110" height="160" rx="14" fill="#1e1e2e" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- Status bar -->
    <rect x="35" y="6" width="40" height="4" rx="2" fill="#ffffff" opacity="0.15"/>
    <!-- Menu items -->
    <rect x="10" y="22" width="90" height="26" rx="6" fill="#8b5cf6" opacity="0.12"/>
    <circle cx="25" cy="35" r="8" fill="#ff006e" opacity="0.3"/>
    <rect x="38" y="30" width="50" height="4" rx="2" fill="#f3f4f6" opacity="0.4"/>
    <rect x="38" y="38" width="30" height="3" rx="1.5" fill="#9ca3af" opacity="0.3"/>
    <rect x="10" y="54" width="90" height="26" rx="6" fill="#8b5cf6" opacity="0.08"/>
    <circle cx="25" cy="67" r="8" fill="#fbbf24" opacity="0.3"/>
    <rect x="38" y="62" width="45" height="4" rx="2" fill="#f3f4f6" opacity="0.4"/>
    <rect x="38" y="70" width="35" height="3" rx="1.5" fill="#9ca3af" opacity="0.3"/>
    <rect x="10" y="86" width="90" height="26" rx="6" fill="#8b5cf6" opacity="0.12"/>
    <circle cx="25" cy="99" r="8" fill="#00ff88" opacity="0.3"/>
    <rect x="38" y="94" width="55" height="4" rx="2" fill="#f3f4f6" opacity="0.4"/>
    <rect x="38" y="102" width="25" height="3" rx="1.5" fill="#9ca3af" opacity="0.3"/>
    <!-- Order button -->
    <rect x="10" y="122" width="90" height="28" rx="8" fill="url(#acc3)"/>
    <text x="55" y="140" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="sans-serif">Place Order</text>
  </g>
  <!-- Right side text -->
  <text x="180" y="65" font-size="22" font-weight="bold" fill="#f3f4f6" font-family="sans-serif">Food Truck</text>
  <text x="180" y="90" font-size="10" fill="#9ca3af" font-family="sans-serif">Mobile ordering, payments</text>
  <text x="180" y="104" font-size="10" fill="#9ca3af" font-family="sans-serif">&amp; loyalty for food vendors</text>
  <!-- Feature list -->
  <g transform="translate(180, 115)" font-size="8" font-family="sans-serif">
    <circle cx="5" cy="5" r="3" fill="#00ff88"/><text x="14" y="8" fill="#d1d5db">Online Menu &amp; Ordering</text>
    <circle cx="5" cy="20" r="3" fill="#00ff88"/><text x="14" y="23" fill="#d1d5db">Square Payment Integration</text>
    <circle cx="5" cy="35" r="3" fill="#00ff88"/><text x="14" y="38" fill="#d1d5db">Loyalty Rewards System</text>
    <circle cx="5" cy="50" r="3" fill="#00ff88"/><text x="14" y="53" fill="#d1d5db">Admin Dashboard</text>
  </g>
  <!-- Bottom tag -->
  <rect x="180" y="168" width="120" height="24" rx="12" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="240" y="184" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold" font-family="sans-serif">From $79/mo</text>
</svg>
